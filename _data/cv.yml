          - Authored problems for PascalCTF25/26, UlisseCTF25, and LakeCTF25.
          - Compete in CyberCup.IT and weekly CTF events with EPFL polygl0ts.

      - name: SUI Blockchain Hackathon
        summary: EPFL hackathon project for decentralized education-funding agreements.
        url: https://github.com/ale18V/SUI-Hackathon
        highlights:
