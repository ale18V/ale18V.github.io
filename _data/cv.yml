      - name: Stock Price Predictor
        summary: GPU programming class project implementing and accelerating a neural stock predictor.
        url: https://github.com/ale18V/CudaStonks
        highlights:
          - Implemented the neural network in NumPy and PyTorch.
          - Ported the algorithm to CUDA with Python Numba, reaching approximately 3x speedup over CPU.

      - name: Parkinson's Disease Detector
        summary: Audio classification project at EPFL LiGHT Laboratory.
        highlights:
          - Designed a transformer-based pipeline for Parkinson's disease detection from vowel phonation.
          - Reached approximately 75% ROC-AUC on the mPower dataset, outperforming a CNN baseline by 15%.

